<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Successful</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#020617;
    padding:40px;
    width:380px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,0,0,.6);
}

.check{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#22c55e;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:50px;
    color:white;
}

h1{
    color:white;
    margin-top:20px;
}

p{
    color:#cbd5f5;
    margin-top:10px;
    font-size:15px;
}

.btn{
    margin-top:25px;
    display:inline-block;
    padding:12px 30px;
    background:#22c55e;
    color:black;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

.btn:hover{
    opacity:.8;
}

</style>
</head>

<body>

<div class="container">

    <div class="check">✓</div>

    <h1>Payment Successful</h1>

    <p>Your order has been completed successfully.</p>

    <p>Thank you for shopping with us.</p>

    <a href="/" class="btn">Return to Store</a>

</div>

</body>
</html>
